version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: express_app
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    depends_on:
      - db
    command: >
      sh -c "
        until pg_isready -h db -U $DB_USER; do
          echo 'Waiting for postgres...';
          sleep 2;
        done;
        node server.js
      "
    networks:
      - app-network

  db:
    image: postgres:17
    container_name: postgres_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network: